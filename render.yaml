services:
  # 1. FastAPI Backend
  - type: web
    name: ai-onboarding-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_EMAIL_DOMAINS
        value: "company.com"

  # 2. React Frontend
  - type: web
    name: ai-onboarding-frontend
    env: static
    rootDir: src/app/demo-ui
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./build"
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: REACT_APP_API_BASE
        fromService:
          type: web
          name: ai-onboarding-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
